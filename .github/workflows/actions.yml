name: run main.py
on:
  schedule:
    - cron: '*/15 * * * *' # Run every 15 minutes
  workflow_dispatch: # Allows manual triggering
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repo content
        uses: actions/checkout@v4 # Use v4 for better compatibility
      - name: setup python
        uses: actions/setup-python@v5 # Use v5 for better compatibility
        with:
          python-version: '3.9' # install the python version needed
          
      - name: install python packages
        run: |
          python -m pip install --upgrade pip
          pip install requests # Install requests library
          
      - name: execute py script # run main.py
        env:
          SOME_SECRET: ${{ secrets.SOME_SECRET }}
        run: python main.py
          
      - name: commit files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # Check if the output directory exists and add its contents
          if [ -d "output" ]; then
            git add output/
          else
            echo "Output directory does not exist, skipping git add for output/"
          fi
          git diff-index --quiet HEAD || (git commit -a -m "updated logs and weather data" --allow-empty)
          
      - name: push changes
        uses: ad-m/github-push-action@v0.6.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
